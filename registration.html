    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", system-ui, "Arial", sans-serif;
        background: #00153a;
        color: #fff;
        min-height: 100vh;
        overflow-x: hidden;
      }

      .hero {
        min-height: 100vh;
        background:
          linear-gradient(rgba(0, 15, 50, 0.6), rgba(0, 15, 50, 0.75)),
          url("https://images.unsplash.com/photo-1525625293386-3f8f99389edd?auto=format&fit=crop&w=1600&q=80")
            center/cover no-repeat;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 30px;
      }

      .container {
        max-width: 1000px;
        width: 100%;
        text-align: center;
      }

      h1 {
        font-size: clamp(3rem, 7vw, 5rem);
        letter-spacing: 2px;
        background: linear-gradient(135deg, #ffb7f2, #ffd966);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        text-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        margin-bottom: 16px;
      }

      /* Premium live badge */
      .live-premium-badge {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        background: linear-gradient(
          135deg,
          rgba(255, 61, 122, 0.2),
          rgba(255, 61, 122, 0.05)
        );
        backdrop-filter: blur(12px);
        padding: 8px 24px;
        border-radius: 60px;
        border: 1px solid rgba(255, 61, 122, 0.5);
        margin-bottom: 25px;
        box-shadow: 0 6px 14px rgba(0, 0, 0, 0.2);
      }
      .pulse-indicator {
        width: 12px;
        height: 12px;
        background: #22c55e;
        border-radius: 50%;
        box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.6);
        animation: livePulse 1.5s infinite;
      }
      @keyframes livePulse {
        0% {
          box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7);
        }
        70% {
          box-shadow: 0 0 0 10px rgba(34, 197, 94, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(34, 197, 94, 0);
        }
      }
      .live-premium-badge span {
        font-weight: 700;
        letter-spacing: 1px;
        color: #fff;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
      }
      /* Headline style */
      .post-launch-headline {
        background: linear-gradient(135deg, #ffd966, #ffb347);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        font-weight: 700;
      }

      /* Description card */
      .post-launch-description {
        background: rgba(0, 0, 0, 0.45);
        backdrop-filter: blur(10px);
        border-radius: 32px;
        padding: 28px 30px;
        margin: 20px auto 28px;
        max-width: 760px;
        border: 1px solid rgba(255, 255, 255, 0.15);
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
      }
      .post-launch-description p {
        margin: 0;
        font-size: 1.2rem;
        font-weight: 500;
        line-height: 1.5;
        color: #fef9e8;
      }
      .post-launch-description strong {
        color: #ffb347;
      }

      /* Registration button */
      .registration-block {
        margin: 20px auto 20px;
        text-align: center;
        animation: fadeZoom 0.7s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      }
      .register-btn {
        background: linear-gradient(105deg, #ff3d7a 0%, #e6326b 100%);
        border: none;
        padding: 18px 45px;
        font-size: 1.8rem;
        font-weight: 800;
        border-radius: 80px;
        color: white;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        box-shadow:
          0 18px 32px rgba(255, 61, 122, 0.3),
          0 0 0 1px rgba(255, 255, 255, 0.25);
        font-family: inherit;
        letter-spacing: 2px;
      }
      .register-btn:hover {
        transform: scale(1.03) translateY(-4px);
        background: linear-gradient(105deg, #ff2060, #dc2c60);
        box-shadow: 0 28px 40px rgba(255, 61, 122, 0.4);
      }
      .register-btn:active {
        transform: scale(0.98);
      }

      /* Contact section */
      .contact {
        margin-top: 35px;
        background: rgba(255, 255, 255, 0.08);
        padding: 22px 20px;
        border-radius: 18px;
        backdrop-filter: blur(6px);
      }
      .contact h3 {
        font-size: 1.2rem;
        margin-bottom: 8px;
      }
      .buttons {
        display: flex;
        gap: 14px;
        justify-content: center;
        flex-wrap: wrap;
        margin-top: 18px;
        align-items: center;
      }
      .btn-channel {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 12px 22px;
        border-radius: 999px;
        background: #fff;
        color: #075e54;
        font-weight: 700;
        font-size: 0.95rem;
        text-decoration: none;
        border: 2px solid #25d366;
        transition:
          background 0.2s,
          transform 0.15s;
      }
      .btn-channel:hover {
        background: #e6faf0;
        transform: translateY(-1px);
        text-decoration: none;
      }
      .btn-channel svg {
        width: 20px;
        height: 20px;
        flex-shrink: 0;
      }
      .live-dot {
        width: 8px;
        height: 8px;
        background: #25d366;
        border-radius: 50%;
        display: inline-block;
        flex-shrink: 0;
        animation: bpulse 1.6s infinite;
      }
      @keyframes bpulse {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.13);
        }
      }
      .email-link {
        color: #7dff9a;
        font-weight: 600;
        text-decoration: none;
      }
      .email-link:hover {
        text-decoration: underline;
      }
      @keyframes fadeZoom {
        0% {
          opacity: 0;
          transform: scale(0.92);
        }
        100% {
          opacity: 1;
          transform: scale(1);
        }
      }
      @media (max-width: 480px) {
        .register-btn {
          font-size: 1.3rem;
          padding: 14px 30px;
        }
        .post-launch-description {
          padding: 18px 20px;
        }
        .post-launch-description p {
          font-size: 1rem;
        }
        .live-premium-badge {
          padding: 6px 18px;
        }
      }
    </style>
  </head>
  <body>
    <section class="hero">
      <div class="container">
        <!-- Live badge -->
        <div class="live-premium-badge">
          <div class="pulse-indicator"></div>
          <span>🔴 GET STARTED HERE</span>
        </div>

        <h1>STARHELA</h1>

        <!-- Premium description card: Brief and action-oriented -->
        <div class="post-launch-description">
          <p>
            🚀
            <strong
              >To get started in STARHELA, complete your registration.</strong
            ><br />
            Unlock earning opportunities, premium tools, and a thriving
            community.<br />
            Your future starts here — claim your spot today.
          </p>
        </div>

        <!-- Registration button -->
        <div class="registration-block">
          <button id="registerNowBtn" class="register-btn">
            🚀 REGISTER NOW
          </button>
        </div>

        <!-- Community & contact -->
        <div class="contact">
          <h3>Follow Us For Updates</h3>
          <div class="buttons">
            <a
              class="btn-channel"
              href="https://whatsapp.com/channel/0029VbD0NZf0VycJyk85mq16"
              target="_blank"
              rel="noopener"
            >
              <svg
                viewBox="0 0 24 24"
                fill="#25d366"
                xmlns="http://www.w3.org/2000/svg"
                width="20"
                height="20"
              >
                <path
                  d="M12 2C6.477 2 2 6.477 2 12c0 1.89.525 3.66 1.438 5.168L2 22l4.975-1.418A9.953 9.953 0 0012 22c5.523 0 10-4.477 10-10S17.523 2 12 2zm4.898 13.766c-.205.576-1.2 1.1-1.654 1.17-.42.063-.948.09-1.53-.097-.353-.113-.806-.264-1.387-.517-2.44-1.054-4.03-3.507-4.152-3.67-.123-.163-.99-1.317-.99-2.513 0-1.197.627-1.786.85-2.03.222-.244.483-.305.644-.305.16 0 .32.002.46.009.148.007.346-.056.54.413.201.484.681 1.672.74 1.793.06.12.1.26.02.42-.08.16-.12.26-.24.4-.12.14-.252.312-.36.42-.12.12-.245.25-.105.49.14.24.62.964 1.33 1.563.913.786 1.685 1.03 1.925 1.145.24.115.38.097.52-.058.14-.155.6-.698.76-.937.16-.24.32-.2.54-.12.22.08 1.4.66 1.64.78.24.12.4.18.46.28.06.1.06.58-.145 1.155z"
                />
              </svg>
              <span class="live-dot"></span> Join Our WhatsApp Channel
            </a>
          </div>
        </div>

        <p style="margin-top: 14px">
          📧 Email:
          <a href="mailto:starhelaofficials@gmail.com" class="email-link"
            >Starhelaofficials@gmail.com</a
          >
        </p>
      </div>
    </section>

    <script>
      // STARHELA - POST LAUNCH PAGE (Clean & Professional)
      // Registration redirect: https://starhela.com/register.php?ref=sydney
      (function () {
        const REGISTER_URL = "https://starhela.com/register.php?ref=sydney";
        const registerButton = document.getElementById("registerNowBtn");

        if (registerButton) {
          registerButton.addEventListener("click", (e) => {
            e.preventDefault();
            window.location.href = REGISTER_URL;
          });
        }

        // Optional: add subtle console info
        console.log("✅ STARHELA — Platform is LIVE. Registration ready.");
      })();
    </script>
  </body>
</html>
